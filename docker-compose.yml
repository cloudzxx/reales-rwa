services:
  hardhat:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8545 -X POST -H 'Content-Type: application/json' -d '{\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1,\"jsonrpc\":\"2.0\"}'"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s

  solana-validator:
    image: solanalabs/solana:stable
    ports:
      - "8899:8899"
      - "8900:8900"
    command: solana-test-validator --reset --quiet --limit-ledger-size 50000000 --no-bpf-jit
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8899", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  deploy:
    build:
      context: ./contracts
      dockerfile: Dockerfile.deploy
    depends_on:
      hardhat:
        condition: service_healthy
    environment:
      - OUTPUT_DIR=/output
      - HARDHAT_RPC_URL=http://hardhat:8545
    volumes:
      - generated:/output

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      deploy:
        condition: service_completed_successfully
    volumes:
      - generated:/generated:ro
    environment:
      - OWNER_PRIVATE_KEY=${OWNER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - AI_AGENT_URL=http://ai-agent:8000
      - RPC_URL=http://hardhat:8545
      - SOLANA_RPC_URL=http://solana-validator:8899

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - hardhat
      - solana-validator
    environment:
      - RPC_URL=http://hardhat:8545
      - SOLANA_RPC_URL=http://solana-validator:8899
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}

volumes:
  generated:
